<title>Widget Acordeón Planetario</title>
<style>

<div id="acc" style="font-family:Helvetica,Arial,sans-serif;background:#fce8e8;border-radius:14px;overflow:hidden">

  </div>

      <div id="acc-table" style="padding-top:16px">

var isOpen=false;
var dataLoaded=false;

var header=document.getElementById('acc-header');
var body=document.getElementById('acc-body');
var chev=document.getElementById('acc-chev');

header.addEventListener('click',function(){
  isOpen=!isOpen;
  body.style.maxHeight=isOpen?body.scrollHeight+'px':'0';
  chev.style.transform=isOpen?'rotate(180deg)':'rotate(0deg)';
  if(isOpen&&!dataLoaded){loadData();}
});

function loadData(){
  dataLoaded=true;
  fetch(API)
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(data){
      var subj=data.subject;
      var planets=PL.map(function(p){var pd=subj[p.k];return{k:p.k,n:p.n,s:p.s,sign:pd.sign,position:pd.position,abs_pos:pd.abs_pos,retrograde:pd.retrograde};});
      document.getElementById('acc-table').innerHTML=makeTable(planets);
      document.getElementById('acc-ts').textContent=fmtTS(subj.iso_formatted_utc_datetime);
      body.style.maxHeight=body.scrollHeight+'px';
    })
    .catch(function(e){
      document.getElementById('acc-table').innerHTML='<div style="color:#cc3333;font-size:13px;padding:20px 0;font-family:Helvetica,Arial,sans-serif">No se pudo conectar con el servidor.<br><span style="color:#9a7898;font-size:11px">'+e.message+'</span></div>';
      body.style.maxHeight=body.scrollHeight+'px';
    });
}

function makeTable(planets){
  var rows=planets.map(function(pl,i){
    var sg=SM[pl.sign];if(!sg){for(var k in SM){if(SM[k].n.toLowerCase()===pl.sign.toLowerCase()){sg=SM[k];break;}}}if(!sg)sg={s:'?',n:pl.sign,e:'Fire'};
    var deg=Math.floor(pl.position),mins=Math.floor((pl.position-deg)*60),minStr=mins<10?'0'+mins:''+mins;
    var pos=deg+'°'+minStr+"'";
    var retro=pl.retrograde?' <span style="color:#cc2222;font-weight:700">&#8478;</span>':'';
    var bg=i%2===0?'rgba(0,0,0,0.03)':'transparent';
    var sc=EC[sg.e]==='#baccb2'?'#4a6a40':EC[sg.e]==='#efe698'?'#6a6810':EC[sg.e];
    var icon='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="26" height="26" fill="'+sc+'">'+PP[pl.k]+'</svg>';
    return '<tr style="background:'+bg+'"><td style="padding:9px 10px;text-align:center;line-height:1">'+icon+'</td><td style="padding:9px 8px;font-size:13px;font-family:Helvetica,Arial,sans-serif;color:#2a1a30">'+pl.n+'</td><td style="padding:9px 10px;font-size:19px;text-align:center;color:'+sc+';line-height:1;font-family:Helvetica,Arial,sans-serif">'+sg.s+'</td><td style="padding:9px 8px;font-size:13px;color:'+sc+';font-family:Helvetica,Arial,sans-serif">'+sg.n+'</td><td style="padding:9px 8px;font-size:13px;font-variant-numeric:tabular-nums;white-space:nowrap;color:#2a1a30;font-family:Helvetica,Arial,sans-serif">'+pos+retro+'</td></tr>';
  }).join('');
  return '<table style="width:100%;border-collapse:collapse"><thead><tr style="border-bottom:1px solid rgba(0,0,0,0.12)"><th style="padding:6px 10px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#7a5888;font-weight:400;text-align:center;font-family:Helvetica,Arial,sans-serif">S&iacute;mbolo</th><th style="padding:6px 8px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#7a5888;font-weight:400;text-align:left;font-family:Helvetica,Arial,sans-serif">Planeta</th><th style="padding:6px 10px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#7a5888;font-weight:400;text-align:center;font-family:Helvetica,Arial,sans-serif">Signo</th><th style="padding:6px 8px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#7a5888;font-weight:400;text-align:left;font-family:Helvetica,Arial,sans-serif">Nombre</th><th style="padding:6px 8px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#7a5888;font-weight:400;text-align:left;font-family:Helvetica,Arial,sans-serif">Posici&oacute;n</th></tr></thead><tbody>'+rows+'</tbody></table>';
}

function fmtTS(iso){
  var dt=new Date(iso);
  var dias=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  var meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  var h=dt.getUTCHours()<10?'0'+dt.getUTCHours():''+dt.getUTCHours();
  var m=dt.getUTCMinutes()<10?'0'+dt.getUTCMinutes():''+dt.getUTCMinutes();
  return 'Calculado el '+dias[dt.getUTCDay()]+' '+dt.getUTCDate()+' de '+meses[dt.getUTCMonth()]+' • '+h+':'+m+' UTC';
}
})();
</script>
